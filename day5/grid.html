      .container {
        display: grid;

        grid-template-columns: 200px 1fr;
        grid-template-rows: auto 1fr auto;

        grid-template-areas:
          "header header"
          "sidebar main"
          "footer footer";

        gap: 10px;
      }
      /* .item1 {

      .layout {
        display: grid;
        height: 100vh;
        grid-template-columns: 200px 1fr;
        grid-template-rows: 100px 1fr 100px;
      }
      .header {
        background-color: red;
        grid-column: 1/3;
        display: flex;
        ul {
          display: flex;
          list-style: none;
          li {
            margin: 0 10px;
          }
        }

        justify-content: space-around;
        align-items: center;
      }
      .footer {
        background-color: red;
        grid-column: 1/3;
      }
      .sidebar {
        background-color: green;
      }
      .main-content {
        background-color: blue;
      }

      .grid-container {
        display: grid;
        grid-template-columns: 190px 190px 190px;
        grid-template-rows: 100px 100px;
        grid-auto-columns: 200px;
        grid-auto-rows: 100px;
        gap: 10px;
        background-color: blue;
        border: 1px solid black;
      }
      .item1 {
        background-color: red;
        grid-column: 4/5;
        grid-row: 4/5;
      }
    </style>
  </head>
